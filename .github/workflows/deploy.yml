name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React app (base = /MaxSales/)
        run: npx vite build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # Deploy built dist/ INTO the gh-pages branch.
      # clean: false  → preserves existing files on gh-pages (our landing index.html)
      # folder: dist  → only the built assets are pushed
      # target-folder: .  → place them at the repo root on gh-pages (Vite base=/MaxSales/
      #                      means all assets already have /MaxSales/ prefix baked in)
      - name: Deploy to gh-pages (preserve landing)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: false
          commit-message: "ci: deploy React app build [skip ci]"
