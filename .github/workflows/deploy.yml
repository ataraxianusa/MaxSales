name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React app (base = /MaxSales/)
        run: npx vite build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # Rename index.html → app.html so the landing page (index.html on gh-pages)
      # is never overwritten by the React build output.
      - name: Rename dist/index.html to app.html
        run: mv dist/index.html dist/app.html

      # Deploy polished static landing page as root index.html
      - name: Copy landing page to dist/index.html
        run: cp landing.html dist/index.html

      - name: Deploy to gh-pages (preserve landing)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: false
          commit-message: "ci: deploy landing page + React app build [skip ci]"
